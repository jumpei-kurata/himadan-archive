app = "himadan-archive"
primary_region = "nrt"

[build]
  dockerfile = "packages/backend/Dockerfile"
  build_target = "runner"

[env]
  NODE_ENV = "production"
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "himadan_data"
  destination = "/data"
